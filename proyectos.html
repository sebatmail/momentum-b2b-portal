<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="stylesheet" href="./css/momentum.css">
    <link rel="shortcut icon" href="./assets/images/momentum_logo.jpg" type="image/png">
    <link href="https://cdn.datatables.net/v/dt/dt-2.3.8/datatables.min.css" rel="stylesheet"
        integrity="sha384-1BvCnyKidMPIGQGjvMn+w+90hHBhYJtF+R7os4NX2Abe7tSxWQadHRTSH5qb559A" crossorigin="anonymous">


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/v/dt/dt-2.3.8/datatables.min.js"
        integrity="sha384-kjkli48Tmhwhaghq0IIRm8gFmMdnihfu1ywAOyyGWYMsoZZi/6AX2fWzpsqahoFw"
        crossorigin="anonymous"></script>
    <script src="./scripts/proyectos.js"></script>


    <title>Referidos | Partners</title>
</head>

<body>
    <!-- Background galáctico -->
    
    

    <nav class="navbar navbar-expand-lg momentum-nav" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand momentum-brand" href="./index.html"><img src="./assets/images/momentum_logo.jpg" alt="Logo"><span class="brand-text">MOMENTUM<br>SPACE</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="./index.html" class="nav-link">Partners (Directorio)</a></li>
                    <li class="nav-item"><a href="./formulario.html" class="nav-link">Registro Partner</a></li>
                    <li class="nav-item"><a href="./proyectos.html" class="nav-link active">Referidos</a></li>
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link">Mi Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row gap-4 justify-content-center">
            
            <!-- Listado de proyectos -->
            <div class="col-lg-12 glass-container p-5 rounded-4 shadow-lg mb-4">
                <h2 class="text-center momentum-title mb-4">Directorio de Clientes Referidos (Histórico Global)</h2>
                <div class="table-responsive">
                    <table id="tablaProyectos" class="table table-dark table-striped table-hover momentum-table display w-100">
                        <thead>
                            <tr>
                                <th>Nombre del Proyecto</th>
                                <th>Partner Responsable</th>
                                <th>Prioridad</th>
                                <th>Estado</th>
                                <th>Avance</th>
                                <th>Presupuesto</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Formulario de creación de proyectos -->
            <div class="col-lg-8 glass-container p-5 rounded-4 shadow-lg">
                <h3 class="momentum-title text-center mb-4">Ingresar Nuevo Cliente Referido</h3>
                <form id="registroProyecto">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="selectUsuario" class="form-label text-light">Partner Responsable (Tú):</label>
                            <select name="usuarioId" id="selectUsuario" class="form-select bg-dark text-light border-secondary" required>
                                <option value="" selected disabled>Selecciona tu cuenta de Partner</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="inputNombreProyecto" class="form-label text-light">Nombre del Cliente / Empresa:</label>
                            <input type="text" name="nombre" id="inputNombreProyecto" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="selectCategoria" class="form-label text-light">Categoría del Servicio:</label>
                            <select name="categoria" id="selectCategoria" class="form-select bg-dark text-light border-secondary" required>
                                <option value="" selected disabled>Seleccione un Servicio...</option>
                                <option value="Vitrina Digital / Landing Page">Vitrina Digital / Landing Page</option>
                                <option value="Máquina de Cobros (Landing + Pagos)">Máquina de Cobros (Landing + Pagos)</option>
                                <option value="Motor Propio / Plataforma 100% Tuya">Motor Propio / Plataforma 100% Tuya</option>
                                <option value="Acelerador Orbital (Reservas + Ads)">Acelerador Orbital (Reservas + Ads)</option>
                                <option value="Mantenimiento / Soporte VIP">Mantenimiento / Soporte VIP</option>
                                <option value="Google Ads">Google Ads</option>
                                <option value="Auditoría Express de Ciberseguridad">Auditoría Express de Ciberseguridad</option>
                                <option value="Cumplimiento Legal (Ley 21.096)">Cumplimiento Legal (Ley 21.096)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="inputDescripcion" class="form-label text-light">Descripción:</label>
                        <textarea name="descripcion" id="inputDescripcion" class="form-control bg-dark text-light border-secondary" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="inputFechaInicio" class="form-label text-light">Fecha de Inicio:</label>
                            <input type="date" name="fechaInicio" id="inputFechaInicio" class="form-control bg-dark text-light border-secondary">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="inputFechaFin" class="form-label text-light">Fecha de Fin:</label>
                            <input type="date" name="fechaFin" id="inputFechaFin" class="form-control bg-dark text-light border-secondary">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="selectPrioridad" class="form-label text-light">Prioridad:</label>
                            <select name="prioridad" id="selectPrioridad" class="form-select bg-dark text-light border-secondary">
                                <option value="Baja">Baja</option>
                                <option value="Media" selected>Media</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="inputPresupuesto" class="form-label text-light">Presupuesto ($):</label>
                            <input type="number" name="presupuesto" id="inputPresupuesto" class="form-control bg-dark text-light border-secondary">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="inputAvance" class="form-label text-light">Avance (%):</label>
                            <input type="number" name="avance" id="inputAvance" class="form-control bg-dark text-light border-secondary" min="0" max="100" value="0">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-3 mt-4">
                        <button type="button" class="btn btn-momentum px-4 fw-bold" onclick="guardarProyecto()">Registrar Referido</button>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</body>
</html>
